<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar A1 & A2 Parts</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Padauk', sans-serif; /* Myanmar font အတွက် */
        }
        body {
            background-color: #f0f2f5;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #3498db;
        }
        .main-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
        }
        .main-btn {
            padding: 18px 35px;
            font-size: 1.4em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        #a1-btn {
            background-color: #1abc9c;
            color: white;
        }
        #a1-btn:hover {
            background-color: #16a085;
            transform: translateY(-3px);
        }
        #a2-btn {
            background-color: #9b59b6;
            color: white;
        }
        #a2-btn:hover {
            background-color: #8e44ad;
            transform: translateY(-3px);
        }
        .parts-container {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none; /* ပုံမှန်အားဖြင့် ဖွက်ထား */
            border-left: 5px solid #3498db;
        }
        .parts-title {
            font-size: 1.3em;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        .parts-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        .part-link {
            display: block;
            text-align: center;
            padding: 14px 5px;
            background-color: white;
            border-radius: 8px;
            text-decoration: none;
            color: #2980b9;
            font-weight: bold;
            border: 2px solid #e0e0e0;
            transition: all 0.2s ease;
        }
        .part-link:hover {
            background-color: #2980b9;
            color: white;
            border-color: #2980b9;
            transform: scale(1.05);
        }
        .instruction {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 30px;
            padding: 15px;
            background-color: #fef9e7;
            border-radius: 8px;
            border-left: 4px solid #f1c40f;
        }
        @media (max-width: 600px) {
            .main-buttons {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .main-btn {
                width: 90%;
            }
            .parts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Grammar A1 & A2 Parts</h1>
        
        <div class="main-buttons">
            <button class="main-btn" id="a1-btn">A1 Grammar</button>
            <button class="main-btn" id="a2-btn">A2 Grammar</button>
        </div>

        <!-- A1 Parts Container -->
        <div class="parts-container" id="a1-parts">
            <h3 class="parts-title">A1 Grammar Parts (1-10)</h3>
            <div class="parts-grid" id="a1-links">
                <!-- JavaScript ကနေ ဖန်တီးပါမယ် -->
            </div>
        </div>

        <!-- A2 Parts Container -->
        <div class="parts-container" id="a2-parts">
            <h3 class="parts-title">A2 Grammar Parts (1-10)</h3>
            <div class="parts-grid" id="a2-links">
                <!-- JavaScript ကနေ ဖန်တီးပါမယ် -->
            </div>
        </div>

        <div class="instruction">
            A1 သို့မဟုတ် A2 ခလုတ်ကို နှိပ်ပါ။ သက်ဆိုင်ရာ Part ခလုတ်များ အောက်တွင် ပေါ်လာပါမည်။
        </div>
    </div>

    <script>
        // Main buttons တွေကို ရွေးပါ
        const a1Btn = document.getElementById('a1-btn');
        const a2Btn = document.getElementById('a2-btn');
        
        // Parts containers တွေကို ရွေးပါ
        const a1PartsContainer = document.getElementById('a1-parts');
        const a2PartsContainer = document.getElementById('a2-parts');
        
        // Links container တွေကို ရွေးပါ
        const a1LinksContainer = document.getElementById('a1-links');
        const a2LinksContainer = document.getElementById('a2-links');

        // Function to create part links
        function createPartLinks(level, container) {
            container.innerHTML = ''; // ရှိပြီးသား content ကို ရှင်းပါ
            for (let i = 1; i <= 10; i++) {
                const link = document.createElement('a');
                link.href = `${level}/part${i}.html`;
                link.className = 'part-link';
                link.textContent = `Part ${i}`;
                link.target = "_blank"; // လင့်ခ်ကို new tab မှာ ဖွင့်ဖို့
                container.appendChild(link);
            }
        }

        // A1 button ကို နှိပ်ရင်
        a1Btn.addEventListener('click', function() {
            // A2 container ကို ဖွက်ပါ (တစ်ချိန်တည်း တစ်ခုပဲပေါ်ရန်)
            a2PartsContainer.style.display = 'none';
            
            // A1 container ကို toggle လုပ်ပါ
            if (a1PartsContainer.style.display === 'block') {
                a1PartsContainer.style.display = 'none';
            } else {
                a1PartsContainer.style.display = 'block';
                // A1 links တွေ ဖန်တီးပါ (လိုအပ်ရင်)
                if (a1LinksContainer.children.length === 0) {
                    createPartLinks('A1', a1LinksContainer);
                }
            }
        });

        // A2 button ကို နှိပ်ရင်
        a2Btn.addEventListener('click', function() {
            // A1 container ကို ဖွက်ပါ (တစ်ချိန်တည်း တစ်ခုပဲပေါ်ရန်)
            a1PartsContainer.style.display = 'none';
            
            // A2 container ကို toggle လုပ်ပါ
            if (a2PartsContainer.style.display === 'block') {
                a2PartsContainer.style.display = 'none';
            } else {
                a2PartsContainer.style.display = 'block';
                // A2 links တွေ ဖန်တီးပါ (လိုအပ်ရင်)
                if (a2LinksContainer.children.length === 0) {
                    createPartLinks('A2', a2LinksContainer);
                }
            }
        });

        // စပြီး run တဲ့အခါ A1 links တွေ create လုပ်ထားပါ (optional)
        // createPartLinks('A1', a1LinksContainer);
        // createPartLinks('A2', a2LinksContainer);
    </script>
</body>
</html>
